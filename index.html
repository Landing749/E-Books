          <text x="0" y="10" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C">continues</text>
        </g>
        <text x="280" y="192" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#A8A49C" letter-spacing="2">each oversight layer = record of previous layer's failure</text>
      </svg>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">2.1</span>The Oversight Mechanism</div>
    <p class="body-text">An oversight mechanism introduced into a high-continuity institution develops its own institutional characteristics: personnel, budget, procedures, internal culture, self-preservation behaviors. In time it develops the same adaptive properties as the institution it oversees. It then requires its own oversight. This isn't corruption of the oversight mechanism — it's just the mechanism operating in the same environment as everything else.</p>

    <div class="subchapter-title"><span class="subchapter-num">2.2</span>Bureaucratic Photosynthesis</div>
    <p class="body-text">The institutional response to perceived failure is, almost universally, the creation of new structure. More reporting requirements, new committees, supplementary reviews, enhanced audit frameworks — each converts external criticism into internal mass. The institution grows by processing the energy directed against it. Reform becomes food. The Crocodile finds this the most remarkable feature of the mature institution. It's genuinely impressive.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 6.2</div>
      <div class="field-note-text">Count the oversight layers applied to any institutional function. Each additional layer represents a previous layer's failure to produce corrective outcomes. The accumulation of oversight layers is a stratigraphic record of correction failing to correct. Read it as geology.</div>
    </div>
  </div>
</div>`},

// PAGE 21 — PART VI CH 3
{id:'p6c3',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part VI · Myth of Control</div>
    <div class="page-header-right">22</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part VI — Myth of Control</div>
    <div class="chapter-title">Appearance<br>of Order</div>
    <div class="chapter-intro">Order, in an institutional context, is a performance. Not necessarily a dishonest one — but a performance. The question is whether the audience ever gets to see the rehearsal.</div>

    <div class="subchapter-title"><span class="subchapter-num">3.1</span>The Signal Architecture</div>
    <p class="body-text">Institutions maintain elaborate signal architectures — organized meetings, structured reports, consistent terminology, predictable procedure sequences. These signals communicate order to external observers and, importantly, to participants themselves. The signal lets everyone navigate the formal structure while simultaneously operating the informal structure underneath. This two-layer navigation is fluent, largely automatic, and almost invisible to anyone who hasn't been inside long enough to learn it.</p>
    <p class="body-text">The appearance of order isn't false. It corresponds to real regularities in institutional behavior. Those regularities, though, describe how the <em>presentation layer</em> behaves — not how decisions actually get made. The institution is reliably orderly in its self-presentation. This is its most consistent function.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 6.3</div>
      <div class="field-note-text">Distinguish between two kinds of order: decisional order (outcomes are consistent, predictable, aligned with stated criteria) and presentational order (communications are consistent, professional, formally compliant). The latter is universal. The former is rare. They are frequently confused for each other — often deliberately.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">3.2</span>Disruption of the Signal</div>
    <p class="body-text">When the signal architecture breaks down — internal disclosure, external event, a document that wasn't supposed to exist — the institutional response focuses on reconstructing the signal, not examining what it was covering. The presentation layer is the primary problem because operative function depends on it. Examining what's underneath would require suspending the signal. That's not operatively possible while the institution is running.</p>

    <div class="subchapter-title"><span class="subchapter-num">3.3</span>The Observer's Position</div>
    <p class="body-text">The Crocodile observes both the signal and what produces it. This dual observation is the methodological advantage of the waterline position. From the correct angle — low, still, patient — both layers are visible simultaneously. The signal reveals itself as production. The behavior beneath reveals itself as function. The gap between them is the dataset. The Crocodile keeps the log.</p>

    <div class="pull-quote">
      <div class="pull-quote-text">"The most orderly-seeming institutions are often the most thoroughly insulated from correction. Order is expensive to maintain. They've had years to get good at it."</div>
    </div>
  </div>
</div>`},

// PAGE 22 — PART VII CH 1: Field Notes
{id:'p7c1',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part VII · Crocodile Field Notes</div>
    <div class="page-header-right">23</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part VII — Crocodile Field Notes</div>
    <div class="chapter-title">Observation<br>Logs</div>
    <div class="chapter-intro">Condensed field observations from institutional environments at various stages. Presented without editorial interpretation, as observed, at the waterline.</div>

    <div class="log-entry">
      <div class="log-entry-label">${icons.log} Log Entry 7.1.A · Stage II Environment</div>
      <div class="log-entry-text">Meeting convened to address resource allocation irregularities. Attending: seven stakeholders with direct interest in maintaining current allocation. Outcome: committee formed to review methodology. Committee membership drawn from same pool. Timeline: indefinite pending further review. Status: ongoing. <span class="annotation">same meeting, different name</span></div>
    </div>

    <div class="log-entry">
      <div class="log-entry-label">${icons.log} Log Entry 7.1.B · Stage III Environment</div>
      <div class="log-entry-text">Formal inquiry into procurement irregularities concluded. Finding: procedures followed correctly. Observation: the procedures were modified eighteen months prior to the period under review, through a process requiring no external approval, by the same office now exonerated by compliance with those procedures. No finding of irregularity. Procedures working as intended.</div>
    </div>

    <div class="log-entry">
      <div class="log-entry-label">${icons.log} Log Entry 7.1.C · Stage IV Environment</div>
      <div class="log-entry-text">External reform mandate received. Institutional response: enthusiastic endorsement at all levels, rapid establishment of reform committee, publication of reform roadmap, comprehensive communication campaign. Operative behaviors: <span style="font-family:'Caveat',cursive;font-size:15px;color:var(--amber)">unchanged.</span> Follow-up observation scheduled.</div>
    </div>

    <div class="log-entry">
      <div class="log-entry-label">${icons.log} Log Entry 7.1.D · Stage Unknown</div>
      <div class="log-entry-text">Subject asked if the institution had changed in the last decade. Subject responded with detailed account of structural reforms implemented in that period. Subject was then asked if the behaviors the reforms were designed to address had changed. Pause. Subject discussed further reforms currently underway.</div>
    </div>

    <div class="field-note" style="margin-top:20px">
      <div class="field-note-label">${icons.observe} Crocodile Note</div>
      <div class="field-note-text">These logs aren't curated for maximum dysfunction. They're representative samples. The remarkable thing isn't that they exist. It's how unremarkable they seem after a while.</div>
    </div>
  </div>
</div>`},

        <div class="stat-value" style="color:#2D6A4F">99%</div>
      </div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">2.2</span>On the Reliability of Patterns</div>
    <p class="body-text">The field observer doesn't present these as cause for despair or as argument against effort. Patterns are data. They describe central tendencies, not universal outcomes. Exceptions exist. They're notable precisely because they're exceptions. The field observer records those too.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Crocodile Note</div>
      <div class="field-note-text">The most significant exceptions share one feature: they occurred early in an institution's development, before Stage III embedding was complete. The window for genuine structural change isn't absent — it's narrow and front-loaded. Recognizing it requires looking at the current stage, not the current intentions of the people inside it.</div>
    </div>
  </div>
</div>`},

// PAGE 25 — PART VIII CH 1
{id:'p8c1',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part VIII · Terminal Observations</div>
    <div class="page-header-right">26</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part VIII — Terminal Observations</div>
    <div class="chapter-title">Signal<br>Reduction</div>
    <div class="chapter-intro">As systems approach terminal equilibrium, their signal output doesn't increase — it simplifies. The institution learns exactly how little it needs to show to be left alone. And it shows that amount. No more.</div>

    <div class="subchapter-title"><span class="subchapter-num">1.1</span>The Minimum Viable Signal</div>
    <p class="body-text">Terminal systems have learned — through decades of dealing with auditors, oversight bodies, reform processes, and public pressure cycles — exactly what signal prevents external intervention. The precision of this calibration is genuinely impressive. <em>Sufficient</em> compliance. <em>Sufficient</em> accountability. <em>Sufficient</em> reform. The minimum that maintains external tolerance without producing actual change. This isn't strategy. It's the output of a long optimization process.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 8.1</div>
      <div class="field-note-text">Measure institutional reform outputs against the reform pressure that preceded them. If the magnitude of output is consistently proportional to external pressure — neither exceeding it nor falling significantly below — the institution is calibrating to tolerance, not pursuing change. This is precise. It takes years to learn. By the time an institution is this good at it, the learning is invisible.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">1.2</span>The Crisis Response Pattern</div>
    <p class="body-text">Institutional crises produce a characteristic sequence: rapid signal intensification (visible action, senior appointments, public commitments), then gradual signal reduction as external attention fades, then return to pre-crisis configuration. The cycle varies by crisis severity but the trajectory is consistent. The crisis gets processed. The institution resumes. The observer updates the log: cycle complete, duration within normal parameters.</p>

        <text x="475" y="72" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#2D6A4F">back to baseline</text>

        <text x="309" y="120" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#A8A49C" letter-spacing="2">TIME →</text>

    <div class="subchapter-title"><span class="subchapter-num">1.3</span>Measurement Immunity</div>
    <p class="body-text">Terminal systems exhibit what the field observer calls measurement immunity: the ability to produce favorable outputs on any measurement instrument without modifying underlying behavior. Not through falsification — through accumulated expertise. The institution has encountered many measurement instruments. It has adapted to each one. It measures well. It functions as it always has.</p>
  </div>
</div>`},

    <div class="subchapter-title"><span class="subchapter-num">2.1</span>Characteristics of Endpoint Systems</div>
    <p class="body-text">The endpoint system presents a characteristic behavioral cluster: high formal compliance, low operative alignment with stated purpose, sophisticated presentation layer, robust immune response to corrective intervention, and advanced calibration of external signal to the minimum viable tolerance threshold. None of these is individually remarkable. Together, they produce an institution that appears — from most external angles — to be functioning as intended.</p>

      <div class="field-note-text">Endpoint systems don't announce themselves. They're identifiable only through sustained observation across multiple signal states, with particular attention to the delta between presentation outputs and operative behaviors that surface during periods of reduced observation pressure. Visible to the patient observer. At the waterline.</div>

    <div class="chapter-intro" style="margin-top:20px">This is where the manual ends. Not because the subject is exhausted. Because the Crocodile has accumulated sufficient data. Beyond this point, the observer submerges.</div>

      <p class="body-text" style="margin-bottom:12px">The swamp doesn't know it's a swamp. This is its most important property and its most reliable defense. The organisms inside don't experience the swamp as a condition — they experience it as the world. Suggesting otherwise invites the response of any organism told its home is toxic: disbelief, then behavioral reorganization to prove the suggestion wrong, then return to baseline.</p>

let current = 0;
const display = document.getElementById('page-display');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const pageCount = document.getElementById('page-count');
const progFill = document.getElementById('prog-fill');

function buildUI(){
  pages.forEach((p,i)=>{
    const el = document.createElement('div');
    el.className = 'page';
    el.id = 'pg-'+i;
    el.innerHTML = p.html;
    display.appendChild(el);
  });
  goToPage(0,true);
}

function goToPage(n, instant){
  if(n<0||n>=pages.length) return;
  current = n;
  document.querySelectorAll('.page').forEach((el,i)=>{
    el.classList.toggle('active', i===n);
  });
  pageCount.textContent = (n+1)+' / '+pages.length;
  progFill.style.width = ((n+1)/pages.length*100)+'%';
  prevBtn.disabled = n===0;
  nextBtn.disabled = n===pages.length-1;
}

function prevPage(){if(current>0)goToPage(current-1)}
function nextPage(){if(current<pages.length-1)goToPage(current+1)}

prevBtn.onclick=prevPage;
nextBtn.onclick=nextPage;
document.getElementById('prev-zone').onclick=prevPage;
document.getElementById('next-zone').onclick=nextPage;

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prevPage();
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') nextPage();
});

buildUI();
</script>
