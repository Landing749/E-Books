<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Crocodile's Guide to Corruption</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@300;400;500&family=Caveat:wght@400;600&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#F8F4EC;
  --paper-warm:#F0EBE0;
  --paper-dark:#E8E0D0;
  --ink:#1C1B18;
  --ink-mid:#3D3B34;
  --ink-light:#6B6760;
  --ink-ghost:#A8A49C;
  --green:#2D6A4F;
  --green-mid:#3D8B65;
  --green-light:#52A87D;
  --green-pale:#C8E6D8;
  --amber:#B86200;
  --amber-pale:#FDECD6;
  --rust:#A83220;
  --rust-pale:#FAD9D2;
  --highlight:#FFF3A0;
  --rule:rgba(28,27,24,.12);
}

html,body{height:100%;overflow:hidden;background:#DDD9D0}
body{font-family:'Lora',Georgia,serif;color:var(--ink)}

/* READER SHELL */
#reader{position:fixed;inset:0;display:flex;flex-direction:column}
#page-display{flex:1;position:relative;overflow:hidden;background:#DDD9D0;
  background-image:radial-gradient(circle at 50% 50%, #D4CFCA 0%, #C8C4BC 100%);
}

/* PAGES */
.page{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .35s ease;
  padding:20px 24px 16px;
}
.page.active{opacity:1;pointer-events:auto}
.page.active .book-page{animation:pageIn .4s cubic-bezier(.22,.68,0,1.2) forwards}
@keyframes pageIn{from{transform:translateY(8px) scale(.996);opacity:.6}to{transform:none;opacity:1}}

/* BOOK PAGE */
.book-page{
  width:100%;max-width:780px;height:100%;max-height:940px;
  background:var(--paper);
  border:1px solid rgba(0,0,0,.08);
  box-shadow:
    0 2px 4px rgba(0,0,0,.06),
    0 8px 24px rgba(0,0,0,.1),
    0 24px 60px rgba(0,0,0,.12),
    inset 0 0 0 1px rgba(255,255,255,.6);
  display:flex;flex-direction:column;
  overflow:hidden;position:relative;
}

/* subtle paper texture */
.book-page::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(28,27,24,.025) 28px);
  opacity:.6;
}

/* spine shadow on left */
.book-page::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:6px;pointer-events:none;z-index:2;
  background:linear-gradient(to right, rgba(0,0,0,.06), transparent);
}

/* COVER */
.cover-page{
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:56px 48px 44px;position:relative;overflow:hidden;
}
.cover-page::before{content:none}
.cover-page::after{content:none}

.cover-hatching{
  position:absolute;inset:0;
  background-image:repeating-linear-gradient(
    45deg, transparent, transparent 8px,
    rgba(255,255,255,.018) 8px, rgba(255,255,255,.018) 9px
  );
}
.cover-border{
  position:absolute;inset:16px;
  border:1px solid rgba(255,255,255,.12);
  pointer-events:none;
}
.cover-border-inner{
  position:absolute;inset:22px;
  border:1px solid rgba(255,255,255,.06);
  pointer-events:none;
}

.cover-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:4px;
  color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:44px;
  position:relative;z-index:2;
}

.cover-croc-icon{
  margin-bottom:32px;position:relative;z-index:2;opacity:.9;
}

.cover-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(60px,8vw,96px);letter-spacing:4px;
  color:#fff;line-height:.95;
  margin-bottom:6px;position:relative;z-index:2;
}
.cover-title-sub{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,3.8vw,46px);letter-spacing:8px;
  color:rgba(255,255,255,.45);line-height:1;
  margin-bottom:32px;position:relative;z-index:2;
}

.cover-rule-row{
  display:flex;align-items:center;gap:12px;margin:0 auto 32px;width:200px;
  position:relative;z-index:2;
}
.cover-rule-line{flex:1;height:1px;background:rgba(255,255,255,.2)}
.cover-rule-diamond{
  width:6px;height:6px;background:rgba(255,255,255,.3);
  transform:rotate(45deg);flex-shrink:0;
}

.cover-subtitle{
  font-family:'Lora',serif;font-style:italic;
  font-size:14px;color:rgba(255,255,255,.4);
  margin-bottom:48px;position:relative;z-index:2;letter-spacing:.5px;
}
.cover-author{
  font-family:'Oswald',sans-serif;font-weight:300;
  font-size:12px;letter-spacing:5px;color:rgba(255,255,255,.35);
  text-transform:uppercase;position:relative;z-index:2;
}

/* PAGE HEADER */
.page-header{
  flex-shrink:0;padding:12px 36px 10px;
  border-bottom:1px solid var(--rule);
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:1;
  background:rgba(248,244,236,.9);
}
.page-header-left{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:3px;text-transform:uppercase;color:var(--ink-ghost);
}
.page-header-right{
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;
  color:var(--ink-ghost);
}

/* CONTENT AREA */
.page-content{
  flex:1;overflow-y:auto;padding:28px 44px 36px;
  position:relative;z-index:1;scrollbar-width:thin;
  scrollbar-color:var(--rule) transparent;
}
.page-content::-webkit-scrollbar{width:3px}
.page-content::-webkit-scrollbar-thumb{background:var(--rule);border-radius:2px}

/* TYPOGRAPHY */
.part-label{
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:4px;
  text-transform:uppercase;color:var(--green);margin-bottom:10px;
  display:flex;align-items:center;gap:10px;
}
.part-label::after{content:'';flex:1;height:1px;background:var(--green-pale)}

.chapter-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(40px,5.5vw,62px);letter-spacing:1px;
  color:var(--ink);line-height:1;margin-bottom:20px;
}

.subchapter-title{
  font-family:'Oswald',sans-serif;font-weight:600;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--ink-mid);margin:28px 0 10px;
  display:flex;align-items:center;gap:10px;
}
.subchapter-title::after{content:'';flex:1;height:1px;background:var(--rule)}
.subchapter-num{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--green);flex-shrink:0;
}

.body-text{
  font-family:'Lora',serif;font-size:14.5px;
  line-height:1.85;color:var(--ink-mid);
  margin-bottom:14px;position:relative;z-index:1;
}
.body-text em{font-style:italic;color:var(--ink)}
.body-text strong{font-weight:600;color:var(--ink)}

.chapter-intro{
  font-family:'Lora',serif;font-style:italic;font-size:15.5px;
  line-height:1.75;color:var(--ink-light);
  padding:14px 0 14px 20px;margin-bottom:22px;
  border-left:3px solid var(--green);
}

hr.section-break{border:none;border-top:1px solid var(--rule);margin:24px 0}

/* PULL QUOTE */
.pull-quote{
  margin:28px 0;padding:20px 24px;
  background:var(--paper-warm);
  border-left:4px solid var(--green);
  position:relative;
}
.pull-quote-text{
  font-family:'Lora',serif;font-style:italic;font-size:20px;
  line-height:1.5;color:var(--ink);
}
.pull-quote-attr{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:3px;color:var(--ink-ghost);margin-top:8px;text-transform:uppercase;
}

/* FIELD NOTES */
.field-note{
  background:var(--green-pale);
  border:1px solid rgba(45,106,79,.2);
  border-left:3px solid var(--green);
  padding:14px 18px;margin:20px 0;
  position:relative;
}
.field-note-label{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:3px;color:var(--green);
  text-transform:uppercase;margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.field-note-label svg{flex-shrink:0}
.field-note-text{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;
  line-height:1.8;color:var(--ink-mid);
}

/* WARNING NOTE */
.warn-note{
  background:var(--amber-pale);
  border:1px solid rgba(184,98,0,.2);
  border-left:3px solid var(--amber);
  padding:14px 18px;margin:20px 0;
}
.warn-note-label{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:3px;color:var(--amber);
  text-transform:uppercase;margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.warn-note-text{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;
  line-height:1.8;color:var(--ink-mid);
}

/* DANGER NOTE */
.danger-note{
  background:var(--rust-pale);
  border:1px solid rgba(168,50,32,.2);
  border-left:3px solid var(--rust);
  padding:14px 18px;margin:20px 0;
}
.danger-note-label{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:3px;color:var(--rust);
  text-transform:uppercase;margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.danger-note-text{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;
  line-height:1.8;color:var(--ink-mid);
}

/* ANNOTATION (handwritten) */
.annotation{
  font-family:'Caveat',cursive;
  font-size:14px;color:var(--amber);
  transform:rotate(-2deg);display:inline-block;
  margin-left:10px;
}

/* DIAGRAM */
.diagram-wrap{margin:24px 0;text-align:center}
.diagram-caption{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:2px;color:var(--ink-ghost);
  text-transform:uppercase;margin-top:8px;
}
.diagram-label{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:2px;color:var(--ink-ghost);
  text-transform:uppercase;margin-bottom:8px;text-align:left;
}

/* SPECIMEN BOX */
.specimen{
  border:1px solid var(--rule);
  background:var(--paper-warm);
  padding:18px 20px;margin:20px 0;
  position:relative;
}
.specimen-label{
  position:absolute;top:-9px;left:14px;
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:3px;
  text-transform:uppercase;color:var(--amber);
  background:var(--paper-warm);padding:0 6px;
}

/* TOC */
.toc-part{margin-bottom:20px}
.toc-part-label{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;letter-spacing:4px;
  text-transform:uppercase;color:var(--green);margin-bottom:8px;
  padding-bottom:5px;border-bottom:1px solid var(--rule);
}
.toc-entry{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:5px 0;cursor:pointer;transition:all .15s;
}
.toc-entry:hover .toc-entry-title{color:var(--ink)}
.toc-entry-title{
  font-family:'Lora',serif;font-size:13.5px;
  color:var(--ink-light);transition:color .15s;
}
.toc-dots{
  flex:1;border-bottom:1px dotted var(--rule);
  margin:0 8px;height:1px;position:relative;top:-4px;
}
.toc-page{
  font-family:'Bebas Neue',sans-serif;font-size:16px;
  color:var(--ink-ghost);
}

/* DEDICATION */
.dedication-content{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;padding:60px 50px;text-align:center;
}
.dedication-text{
  font-family:'Lora',serif;font-style:italic;
  font-size:16px;line-height:2.1;color:var(--ink-light);
  max-width:380px;
}
.dedication-sub{
  font-family:'Caveat',cursive;font-size:15px;
  color:var(--ink-ghost);
  margin-top:32px;
}

/* LOG ENTRIES */
.log-entry{
  border:1px solid var(--rule);
  border-left:3px solid var(--amber);
  padding:14px 18px;margin:16px 0;
  background:var(--amber-pale);
}
.log-entry-label{
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:3px;
  color:var(--amber);text-transform:uppercase;margin-bottom:8px;
}
.log-entry-text{
  font-family:'Lora',serif;font-size:13.5px;
  line-height:1.8;color:var(--ink-mid);
}

/* STAT BARS */
.stat-grid{display:grid;gap:10px;margin:20px 0}
.stat-row{display:flex;align-items:center;gap:12px}
.stat-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--ink-light);width:170px;flex-shrink:0;text-transform:uppercase;letter-spacing:1px;
}
.stat-bar-track{
  flex:1;height:6px;background:var(--paper-dark);border-radius:3px;overflow:hidden;
}
.stat-bar-fill{
  height:100%;border-radius:3px;
  animation:barGrow .9s cubic-bezier(.22,.68,0,1.1) forwards;
  transform-origin:left;
}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.stat-value{
  font-family:'Bebas Neue',sans-serif;font-size:17px;
  color:var(--ink-mid);width:36px;text-align:right;
}

/* NAV */
#nav-bar{
  flex-shrink:0;padding:10px 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:#D4CFCA;border-top:1px solid rgba(0,0,0,.1);
}
.nav-btn{
  background:#F8F4EC;border:1px solid rgba(0,0,0,.12);
  color:var(--ink-mid);padding:6px 18px;
  font-family:'Oswald',sans-serif;font-weight:400;font-size:11px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s;
  border-radius:2px;
}
.nav-btn:hover:not(:disabled){background:var(--ink);color:#fff;border-color:var(--ink)}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-mid{display:flex;align-items:center;gap:14px}
.nav-count{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--ink-light);letter-spacing:1px}
.progress-track{
  width:120px;height:3px;background:rgba(0,0,0,.12);
  border-radius:2px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--green);border-radius:2px;
  transition:width .4s ease;
}

/* CLICK ZONES */
#prev-zone,#next-zone{
  position:fixed;top:0;bottom:52px;width:80px;
  cursor:pointer;z-index:50;display:flex;align-items:center;
}
#prev-zone{left:0;justify-content:flex-start;padding-left:12px}
#next-zone{right:0;justify-content:flex-end;padding-right:12px}
.zone-arrow{
  opacity:0;transition:opacity .25s;
  font-family:'Bebas Neue',sans-serif;font-size:20px;color:rgba(28,27,24,.25);
  letter-spacing:2px;background:#F8F4EC;padding:6px 8px;border-radius:2px;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}
#prev-zone:hover .zone-arrow,#next-zone:hover .zone-arrow{opacity:1}

/* TITLE PAGE */
.title-page-content{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;height:100%;padding:60px 40px;
}
</style>
</head>
<body>
<div id="reader">
  <div id="prev-zone"><span class="zone-arrow">←</span></div>
  <div id="next-zone"><span class="zone-arrow">→</span></div>
  <div id="page-display"></div>
  <div id="nav-bar">
    <button class="nav-btn" id="prev-btn">← Prev</button>
    <div class="nav-mid">
      <span class="nav-count" id="page-count"></span>
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
    <button class="nav-btn" id="next-btn">Next →</button>
  </div>
</div>

      <div style="font-family:'Oswald',sans-serif;font-weight:300;font-size:13px;letter-spacing:5px;color:var(--ink-mid);text-transform:uppercase;margin-bottom:6px">Athan Meir Obrero</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ink-ghost);margin-bottom:56px">Field Observer / System Analyst</div>

// PAGE 4 — PART I CH 1
{id:'p1c1',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part I · The Swamp Framework</div>
    <div class="page-header-right">05</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part I — The Swamp Framework</div>
    <div class="chapter-title">Orientation<br>in the Swamp</div>
    <div class="chapter-intro">A swamp isn't a broken ecosystem. It's an ecosystem that found a more interesting use for itself than anyone planned. That's the whole point.</div>

    <div class="subchapter-title"><span class="subchapter-num">1.1</span>The Nature of the Environment</div>
    <p class="body-text">Every swamp looks like chaos from outside. From inside, it's just home. This manual treats institutional corruption the same way — not as failure, but as a form of <em>success</em>. A system that keeps going is a system solving problems. The problem it ends up solving might not be the one in the brochure, but a solution is a solution.</p>
    <p class="body-text">The organisms in a swamp don't experience disorder. They experience conditions. Some conditions are favorable, some aren't — but none of them register as "the ecosystem has gone wrong." The swamp just is. This is the key thing.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 1.1</div>
      <div class="field-note-text">Every system develops behaviors to keep itself running, regardless of whether those behaviors match its stated purpose. This isn't failure. This is just what systems do. The logo on the building is aspirational. The behavior in the hallways is data.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">1.2</span>First Principle: Everything Adapts</div>
    <p class="body-text">Nothing stays where you put it. Policies adapt to whoever's enforcing them. People adapt to what gets rewarded. What gets rewarded adapts to what's being measured. What's being measured adapts to who collects the data. Who collects the data adapts to who's asking. Every layer shifts. Eventually the original intent is at the bottom somewhere, covered in sediment, technically still there.</p>

    <div class="subchapter-title"><span class="subchapter-num">1.3</span>The Crocodile Posture</div>
    <p class="body-text">The Crocodile doesn't intervene. Observation with judgment isn't observation — it's lobbying with better notebooks. The Crocodile stays at the waterline: present enough to show up in the dataset, still enough not to disturb it. The log grows. The swamp continues.</p>

    <div class="pull-quote">
      <div class="pull-quote-text">"The institution isn't broken. It's found a different job."</div>
    </div>
  </div>
</div>`},

// PAGE 5 — PART I CH 2: Taxonomy of Decay
{id:'p1c2',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part I · The Swamp Framework</div>
    <div class="page-header-right">06</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part I — The Swamp Framework</div>
    <div class="chapter-title">Taxonomy<br>of Decay</div>
    <div class="chapter-intro">Decay isn't the end of function. It's function pointing somewhere new. The four stages below aren't a moral scale — they're just a map of how systems get there.</div>

    <div class="diagram-wrap">
      <div class="diagram-label">Fig 1.2 · Four-Stage Decay Progression</div>
      <svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:640px;display:block">
        <!-- Background track -->
        <rect x="20" y="88" width="600" height="24" rx="12" fill="#E8E0D0"/>
        <!-- Gradient fill -->
        <defs>
          <linearGradient id="dg" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#52A87D" stop-opacity=".7"/>
            <stop offset="35%" stop-color="#8DB89A" stop-opacity=".6"/>
            <stop offset="65%" stop-color="#C67000" stop-opacity=".5"/>
            <stop offset="100%" stop-color="#A83220" stop-opacity=".7"/>
          </linearGradient>
        </defs>
        <rect x="20" y="88" width="600" height="24" rx="12" fill="url(#dg)"/>

        <!-- Stage nodes -->
        <circle cx="90" cy="100" r="22" fill="white" stroke="#2D6A4F" stroke-width="2"/>
        <text x="90" y="105" text-anchor="middle" font-family="Bebas Neue" font-size="15" fill="#2D6A4F">I</text>

        <circle cx="240" cy="100" r="22" fill="white" stroke="#52A87D" stroke-width="2"/>
        <text x="240" y="105" text-anchor="middle" font-family="Bebas Neue" font-size="15" fill="#52A87D">II</text>

        <circle cx="400" cy="100" r="22" fill="white" stroke="#C67000" stroke-width="2"/>
        <text x="400" y="105" text-anchor="middle" font-family="Bebas Neue" font-size="15" fill="#C67000">III</text>

        <circle cx="550" cy="100" r="22" fill="#FAD9D2" stroke="#A83220" stroke-width="2"/>
        <text x="550" y="105" text-anchor="middle" font-family="Bebas Neue" font-size="15" fill="#A83220">IV</text>

        <!-- Labels above -->
        <text x="90" y="56" text-anchor="middle" font-family="Oswald" font-size="11" fill="#2D6A4F" letter-spacing="2" font-weight="600">DRIFT</text>
        <text x="90" y="70" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#6B6760">something's off</text>

        <text x="240" y="56" text-anchor="middle" font-family="Oswald" font-size="11" fill="#3D8B65" letter-spacing="2" font-weight="600">CAPTURE</text>
        <text x="240" y="70" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#6B6760">everyone's adapted</text>

        <text x="400" y="56" text-anchor="middle" font-family="Oswald" font-size="11" fill="#C67000" letter-spacing="2" font-weight="600">EMBEDDING</text>
        <text x="400" y="70" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#6B6760">just how it works</text>

        <text x="550" y="56" text-anchor="middle" font-family="Oswald" font-size="11" fill="#A83220" letter-spacing="2" font-weight="600">EQUILIBRIUM</text>
        <text x="550" y="70" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#6B6760">what problem?</text>

        <!-- Labels below -->
        <text x="90" y="146" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#A8A49C">informal practices emerge</text>
        <text x="240" y="146" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#A8A49C">norms quietly rewritten</text>
        <text x="400" y="146" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#A8A49C">behaviors structuralized</text>
        <text x="550" y="146" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#A8A49C">immune to correction</text>

        <text x="320" y="185" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#A8A49C" letter-spacing="3">SYSTEMIC TIME →</text>
      </svg>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">2.1</span>Reading the Stages</div>
    <p class="body-text">The taxonomy describes states, not timelines. A system can start at Stage II — built from components that were already adapted. Stage IV doesn't mean the institution is old; it means it's thorough.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 1.2</div>
      <div class="field-note-text">Stage IV systems often score highest on audit instruments. They've had the longest to learn what auditors look for. Compliance and actual function are not the same variable. You can optimize one without touching the other.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">2.2</span>How to Place a System</div>
    <p class="body-text">Stage placement comes down to one ratio: original-purpose work versus self-preservation work, as a share of total operations. A Stage IV system still produces outputs that look like its mandate. Those outputs have just become its alibi, not its actual job.</p>
  </div>
</div>`},

// PAGE 6 — PART I CH 3: Rule of Continuity
{id:'p1c3',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part I · The Swamp Framework</div>
    <div class="page-header-right">07</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part I — The Swamp Framework</div>
    <div class="chapter-title">Rule of<br>Continuity</div>
    <div class="chapter-intro">The most durable institutional property isn't efficiency, integrity, or purpose. It's the sheer stubborn tendency to just keep going.</div>

    <div class="subchapter-title"><span class="subchapter-num">3.1</span>The Persistence Gradient</div>
    <p class="body-text">Every institution generates, as a side-effect of existing, a group of people whose lives are easier when it continues. They don't need to be conspiring. They just need to act rationally in their environment — and rational action in most institutional environments means not rocking the boat you're on. It's not corruption. It's physics.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} System Note</div>
      <div class="field-note-text">Continuity isn't a virtue. It's what happens when no external force exceeds the cost of changing. Heavy institutions aren't healthy ones. They're just hard to move.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">3.2</span>The Reformer Paradox</div>
    <p class="body-text">Someone brought in to fix a system hits an immediate trap: to do the job, they need to work within the system; working within the system means adapting to its norms; adapting to its norms erodes the very difference that was supposed to produce change. The institution absorbs reformers. It's very good at this. It's had a lot of practice.</p>

    <div class="diagram-wrap">
      <div class="diagram-label">Fig 1.3 · The Reformer Absorption Curve</div>
      <svg viewBox="0 0 600 145" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:600px;display:block">
        <defs>
          <linearGradient id="rcg" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#2D6A4F"/>
            <stop offset="100%" stop-color="#A83220"/>
          </linearGradient>
        </defs>
        <!-- Axes -->
        <line x1="44" y1="16" x2="44" y2="112" stroke="#E8E0D0" stroke-width="1.5"/>
        <line x1="44" y1="112" x2="568" y2="112" stroke="#E8E0D0" stroke-width="1.5"/>
        <text x="16" y="66" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C" transform="rotate(-90,16,66)">DIVERGENCE FROM NORM</text>
        <text x="306" y="130" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C" letter-spacing="2">TIME IN INSTITUTION →</text>

        <!-- Curve (falls) -->
        <path d="M60,24 C110,24 170,36 250,62 C320,85 390,100 480,108 C520,110 548,111 565,111" 
              stroke="url(#rcg)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <!-- Gradient fill under curve -->
        <path d="M60,24 C110,24 170,36 250,62 C320,85 390,100 480,108 C520,110 548,111 565,111 L565,112 L60,112Z"
              fill="url(#rcg)" opacity=".07"/>

        <!-- Phase labels at top -->
        <text x="152" y="13" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#2D6A4F">"things will change"</text>
        <text x="320" y="13" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#C67000">"working within the system"</text>
        <text x="495" y="13" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#A83220">"this is just how it works"</text>

        <!-- Phase dividers -->
        <line x1="234" y1="16" x2="234" y2="112" stroke="#E8E0D0" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="418" y1="16" x2="418" y2="112" stroke="#E8E0D0" stroke-width="1" stroke-dasharray="4,4"/>

        <!-- Start/end dots -->
        <circle cx="60" cy="24" r="4" fill="#2D6A4F"/>
        <text x="66" y="22" font-family="JetBrains Mono" font-size="7" fill="#2D6A4F">arrival</text>
        <circle cx="565" cy="111" r="4" fill="#A83220"/>
        <text x="520" y="108" font-family="JetBrains Mono" font-size="7" fill="#A83220">absorbed</text>

        <!-- Baseline -->
        <line x1="60" y1="112" x2="565" y2="112" stroke="#A8A49C" stroke-width="1" stroke-dasharray="5,4"/>
        <text x="570" y="115" font-family="JetBrains Mono" font-size="7" fill="#A8A49C">baseline</text>
      </svg>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">3.3</span>Documentation as Continuity</div>
    <p class="body-text">Audits, reviews, reports — in a high-continuity institution, these don't produce correction. They produce evidence that the audit happened. That evidence justifies the next audit. The documentation of oversight becomes the main output of oversight. The crocodile notes this without comment. It's an impressively efficient loop.</p>
  </div>
</div>`},

// PAGE 7 — PART II CH 1
{id:'p2c1',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part II · Language and Control</div>
    <div class="page-header-right">08</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part II — Language and Control</div>
    <div class="chapter-title">Language as<br>Camouflage</div>
    <div class="chapter-intro">Language doesn't just describe what institutions do. It decides which behaviors need explaining, which need hiding, and which need no comment at all.</div>

    <div class="subchapter-title"><span class="subchapter-num">1.1</span>The Vocabulary of Neutralization</div>
    <p class="body-text">Every institution develops its own private language — not to communicate better, but to make certain things unremarkable. An informal practice that accumulates enough repetitions eventually gets a name. Once it has a name, it doesn't need justification anymore. Just a reference.</p>
    <p class="body-text">This usually isn't intentional deception. It's what happens when informal behaviors become part of the furniture. Nobody invented the vocabulary of corruption. They just kept using it until it felt normal.</p>

    <div class="specimen" style="position:relative">
      <div class="specimen-label">Lexical Specimen A — Translation Guide</div>
      <div style="display:grid;grid-template-columns:1fr 24px 1fr;gap:7px 8px;align-items:center;padding-top:4px">
        <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--ink-ghost);letter-spacing:2px">WHAT THEY SAY</div>
        <div></div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--amber);letter-spacing:2px">WHAT IT MEANS</div>
        <div style="height:1px;background:var(--rule);grid-column:1/-1;margin:2px 0"></div>
        <div style="font-family:'Lora',serif;font-style:italic;font-size:13px;color:var(--ink-mid)">"operationalized discretion"</div>
        <div style="font-family:'JetBrains Mono',font-size:10px;color:var(--ink-ghost);text-align:center">→</div>
        <div style="font-family:'Lora',serif;font-size:13px;color:var(--ink-mid)">we do what we want</div>
        <div style="font-family:'Lora',serif;font-style:italic;font-size:13px;color:var(--ink-mid)">"process alignment"</div>
        <div style="font-family:'JetBrains Mono',font-size:10px;color:var(--ink-ghost);text-align:center">→</div>
        <div style="font-family:'Lora',serif;font-size:13px;color:var(--ink-mid)">getting our story straight</div>
        <div style="font-family:'Lora',serif;font-style:italic;font-size:13px;color:var(--ink-mid)">"institutional memory"</div>
        <div style="font-family:'JetBrains Mono',font-size:10px;color:var(--ink-ghost);text-align:center">→</div>
        <div style="font-family:'Lora',serif;font-size:13px;color:var(--ink-mid)">knowing where the bodies are</div>
        <div style="font-family:'Lora',serif;font-style:italic;font-size:13px;color:var(--ink-mid)">"stakeholder engagement"</div>
        <div style="font-family:'JetBrains Mono',font-size:10px;color:var(--ink-ghost);text-align:center">→</div>
        <div style="font-family:'Lora',serif;font-size:13px;color:var(--ink-mid)">managing who's watching us</div>
      </div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">1.2</span>The Bureaucratic Passive</div>
    <p class="body-text">Nobody writes "I made a bad call." They write "the decision was made." The agent disappears. The decision floats free. "Outcomes were not achieved" spreads responsibility across a structure too diffuse to hold accountable. The passive voice isn't a grammar error — it's a load-bearing architectural feature.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 2.1</div>
      <div class="field-note-text">Watch for lexical drift in official communications. When a concrete, uncomfortable behavior picks up abstract procedural language, it's transitioned from exceptional to standard. The terminology follows the behavior. It never leads it.</div>
    </div>
  </div>
</div>`},

// PAGE 8 — PART II CH 2
{id:'p2c2',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part II · Language and Control</div>
    <div class="page-header-right">09</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part II — Language and Control</div>
    <div class="chapter-title">Softening<br>of Meaning</div>
    <div class="chapter-intro">Words start sharp. Institutions sand them down. Given enough handling, a term that once caused friction becomes so smooth it produces none at all.</div>

    <div class="diagram-wrap">
      <div class="diagram-label">Fig 2.2 · Term Lifecycle — Friction Loss Over Time</div>
      <svg viewBox="0 0 600 170" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:600px;display:block">

          </linearGradient>
        </defs>
        <!-- Phase bands -->
        <rect x="44" y="16" width="136" height="116" fill="#2D6A4F" opacity=".04" rx="2"/>
        <rect x="182" y="16" width="137" height="116" fill="#C67000" opacity=".04" rx="2"/>
        <rect x="321" y="16" width="136" height="116" fill="#A83220" opacity=".04" rx="2"/>

        <!-- Axes -->
        <line x1="44" y1="132" x2="574" y2="132" stroke="#E8E0D0" stroke-width="1.5"/>
        <line x1="44" y1="132" x2="44" y2="16" stroke="#E8E0D0" stroke-width="1.5"/>
        <text x="18" y="80" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C" transform="rotate(-90,18,80)">FRICTION LEVEL</text>
        <text x="309" y="152" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C" letter-spacing="2">TIME →</text>

        <!-- Friction curve (falls smoothly) -->
        <path d="M56,42 C90,42 130,48 185,65 C250,85 310,108 390,124 C440,131 510,133 572,133"
              stroke="#A83220" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M56,42 C90,42 130,48 185,65 C250,85 310,108 390,124 C440,131 510,133 572,133 L572,132 L56,132Z"
              fill="#A83220" opacity=".06"/>

        <!-- Meaning/precision curve (rises then falls) -->

              stroke="#2D6A4F" stroke-width="2" fill="none" stroke-dasharray="7,4" stroke-linecap="round"/>

        <text x="90" y="165" font-family="JetBrains Mono" font-size="8" fill="#6B6760">institutional friction</text>
        <line x1="264" y1="162" x2="294" y2="162" stroke="#2D6A4F" stroke-width="2" stroke-dasharray="7,4"/>
        <text x="298" y="165" font-family="JetBrains Mono" font-size="8" fill="#6B6760">semantic precision</text>
      </svg>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">2.1</span>The Euphemism Ratchet</div>
    <p class="body-text">Once you introduce a euphemism, you can't take it back without generating the exact clarity it was designed to prevent. So each term eventually needs a replacement — something softer, more <em>procedural-sounding</em>. And that one needs another. The ratchet only moves one way: more abstraction, less accountability.</p>
    <p class="body-text">Track any significant institutional behavior through three generations of terminology and you've found something the system has been managing — not eliminating — for years.</p>

    <div class="warn-note">
      <div class="warn-note-label">${icons.warn} Diagnostic Note</div>
      <div class="warn-note-text">If a euphemism chain has more than three links, the underlying behavior has been active at least since the first euphemism. The current term isn't the end of the chain. It's just where it is right now.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">2.2</span>Plain Speech as Provocation</div>
    <p class="body-text">In a room adapted to softened language, calling something what it actually is feels like an attack. Specifically, concretely, without cushioning — it produces genuine discomfort, which the group experiences as rudeness, naivety, or bad faith. This isn't accidental. The discomfort protects the vocabulary. The vocabulary protects everything underneath it.</p>
  </div>
</div>`},

// PAGE 9 — PART II CH 3
{id:'p2c3',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part II · Language and Control</div>
    <div class="page-header-right">10</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part II — Language and Control</div>
    <div class="chapter-title">Definitions<br>That Drift</div>
    <div class="chapter-intro">The institutional definition of any term isn't fixed. It's a negotiation between original intent and current operational need — and the negotiation never quite ends.</div>

    <div class="subchapter-title"><span class="subchapter-num">3.1</span>The Stretched Mandate</div>
    <p class="body-text">If an institution is allowed to do <em>A</em>, and <em>B</em> looks enough like <em>A</em>, then by extension it gets to do <em>B</em>. <em>B</em> then generates its own adjacencies. The mandate expands. Nobody draws a new boundary — they just color slightly outside the last one. Each extension is justified by the previous one. The wall is now a gradient.</p>
    <p class="body-text">Here's the interesting part: the institution doesn't experience this as expansion. It experiences it as clarification. Finally figuring out the true scope of what it was always meant to do. Every step outward feels like getting it right.</p>

    <div class="subchapter-title"><span class="subchapter-num">3.2</span>Retroactive Definition</div>
    <p class="body-text">High-continuity systems frequently do the thing first and then adjust their mandate to include it. The action comes before the authority. But by the time anyone looks, the paperwork describes the sequence the other way around: careful analysis, finding of existing power, deliberate decision. The archive is already written. The actual sequence didn't survive the filing.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 2.3</div>
      <div class="field-note-text">A definition that only ever expands — never contracting to exclude functions the institution has claimed — isn't describing existing authority. It's generating new authority in real time. The document claiming to find power is actually producing it. Note the distinction. It matters.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">3.3</span>The Operational Definition Gap</div>
    <p class="body-text">In any mature institution, there are two definitions for any given term: the formal one (written, auditable) and the operative one (what actually triggers the term in practice). The gap between them isn't accidental. It's load-bearing. The formal definition satisfies external scrutiny. The operative definition handles internal function. Both are simultaneously true. The institution lives in the gap.</p>

    <div class="pull-quote">
      <div class="pull-quote-text">"The document isn't describing the power. It's producing it — quietly, while everyone assumes otherwise."</div>
    </div>
  </div>
</div>`},

// PAGE 10 — PART III CH 1
{id:'p3c1',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part III · Structure and Permission</div>
    <div class="page-header-right">11</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part III — Structure and Permission</div>
    <div class="chapter-title">Flow of<br>Permission</div>
    <div class="chapter-intro">Permission isn't binary. It doesn't live on the org chart. It lives in the hallway conversation before the meeting — the one that decides what the meeting will actually conclude.</div>

        <!-- Informal gatekeepers -->

        <text x="374" y="158" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A83220" font-weight="500">INFORMAL</text>
        <text x="374" y="168" text-anchor="middle" font-family="JetBrains Mono" font-size="6.5" fill="#6B6760">gatekeeper</text>

        <rect x="515" y="145" width="80" height="30" rx="3" fill="#FAD9D2" stroke="#A83220" stroke-width="1.5"/>
        <text x="555" y="158" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A83220" font-weight="500">INFORMAL</text>
        <text x="555" y="168" text-anchor="middle" font-family="JetBrains Mono" font-size="6.5" fill="#6B6760">gatekeeper</text>
      </svg>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">1.1</span>The Formal and the Operative</div>
    <p class="body-text">Every institution runs two overlapping permission systems. The formal one is written down and can be shown to outsiders. The operative one governs actual decisions, access, and resources. The distance between them is one of the most reliable measures of how long the institution has been running and how thoroughly it's settled into itself.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 3.1</div>
      <div class="field-note-text">Find the person whose informal approval is sought before formal approval is requested. That's the operative permission node — regardless of their title. The org chart describes aspiration. The approval sequence describes reality. Note which one people actually follow when they want something done.</div>
    </div>
  </div>
</div>`},

// PAGE 11 — PART III CH 2
{id:'p3c2',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part III · Structure and Permission</div>
    <div class="page-header-right">12</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part III — Structure and Permission</div>
    <div class="chapter-title">Small Exceptions<br>Theory</div>
    <div class="chapter-intro">No rule can anticipate every situation. The way institutions handle what their rules can't cover is, in practice, how most institutional drift actually happens.</div>

    <div class="diagram-wrap">
      <div class="diagram-label">Fig 3.2 · Exception Cascade — How One Becomes Many</div>
      <svg viewBox="0 0 620 170" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:620px;display:block">
        <!-- Expanding rings with fill -->
        <circle cx="80" cy="92" r="34" fill="white" stroke="#E8E0D0" stroke-width="1.5"/>
        <circle cx="80" cy="92" r="18" fill="#C8E6D8" stroke="#2D6A4F" stroke-width="2"/>
        <text x="80" y="97" text-anchor="middle" font-family="Bebas Neue" font-size="12" fill="#2D6A4F">RULE</text>

        <circle cx="218" cy="92" r="42" fill="white" stroke="#E8E0D0" stroke-width="1.5"/>
        <circle cx="218" cy="92" r="30" fill="rgba(200,230,216,.5)" stroke="#52A87D" stroke-width="2"/>
        <text x="218" y="88" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#3D8B65">1st</text>
        <text x="218" y="99" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#3D8B65">exception</text>

        <circle cx="390" cy="92" r="54" fill="white" stroke="#E8E0D0" stroke-width="1.5"/>
        <circle cx="390" cy="92" r="42" fill="rgba(253,236,214,.5)" stroke="#C67000" stroke-width="2"/>
        <text x="390" y="88" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#C67000">cascade</text>
        <text x="390" y="99" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#C67000">of exceptions</text>

        <circle cx="558" cy="92" r="56" fill="rgba(250,217,210,.2)" stroke="#A83220" stroke-width="2.5" stroke-dasharray="6,3"/>
        <text x="558" y="88" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#A83220">new</text>
        <text x="558" y="99" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#A83220">normal</text>

        <!-- Arrows -->
        <path d="M100,92 L186,92" stroke="#A8A49C" stroke-width="1.5" marker-end="url(#arrowA)"/>
        <path d="M250,92 L336,92" stroke="#A8A49C" stroke-width="1.5" marker-end="url(#arrowA)"/>
        <path d="M434,92 L500,92" stroke="#A8A49C" stroke-width="1.5" marker-end="url(#arrowA)"/>

        <defs>
          <marker id="arrowA" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
            <path d="M0,1 L6,3.5 L0,6" stroke="#A8A49C" stroke-width="1.2" fill="none"/>
          </marker>
        </defs>

        <!-- Labels below -->
        <text x="80" y="156" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#6B6760">original policy</text>
        <text x="218" y="156" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#6B6760">justified once</text>
        <text x="390" y="156" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#6B6760">each one "small"</text>
        <text x="558" y="156" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#6B6760">rule forgotten</text>
      </svg>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">2.1</span>The Necessary Exception</div>
    <p class="body-text">Every rule generates, at its edges, cases it wasn't built to handle. In a functioning system, judgment is bounded and reviewed. In a high-continuity system, judgment accumulates into practice, practice becomes informal policy, and informal policy becomes what the formal rule pretends not to see. The exception has become the rule. Only the labeling stays the same.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 3.2</div>
      <div class="field-note-text">Count exceptions applied to any rule over a defined period. When exceptions outnumber standard applications, the exception is the rule. The original is vestigial. It exists now primarily to justify the exception, not to govern anything.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">2.2</span>The Exception Cascade</div>
    <p class="body-text">The first exception carves a small channel. The second widens it. The logic of the first becomes the template for the second, the second for the third. Each step seems reasonable. The cumulative distance from the original can be enormous — but since no one ever compares against the original (only against the most recent step), nobody notices the journey. Everyone's just taking a reasonable next step. They have been the whole time.</p>
  </div>
</div>`},

// PAGE 12 — PART III CH 3
{id:'p3c3',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part III · Structure and Permission</div>
    <div class="page-header-right">13</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part III — Structure and Permission</div>
    <div class="chapter-title">Invisible<br>Ownership</div>
    <div class="chapter-intro">The most significant resource decisions in any institution are made by people who don't officially control those resources. This isn't a flaw in the system. It is the system.</div>

    <div class="subchapter-title"><span class="subchapter-num">3.1</span>Who Actually Owns What</div>
    <p class="body-text">Formal ownership of a resource — budget, process, decision — is assigned in documents. Operative ownership is determined by who gets consulted before decisions are made, who can stall execution by withholding cooperation, and who gets mentioned in hushed tones before formal meetings. These are rarely the same people. The gap between them is the real map of the institution.</p>

    <div class="stat-grid">
      <div style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--ink-ghost);text-transform:uppercase;margin-bottom:6px">Ownership Gap Index — by Stage</div>
      <div class="stat-row">
        <div class="stat-label">Stage I · Drift</div>
        <div class="stat-bar-track"><div class="stat-bar-fill" style="width:15%;background:#52A87D"></div></div>
        <div class="stat-value">15%</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">Stage II · Capture</div>
        <div class="stat-bar-track"><div class="stat-bar-fill" style="width:38%;background:#3D8B65"></div></div>
        <div class="stat-value">38%</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">Stage III · Embedding</div>
        <div class="stat-bar-track"><div class="stat-bar-fill" style="width:62%;background:#C67000"></div></div>
        <div class="stat-value">62%</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">Stage IV · Equilibrium</div>
        <div class="stat-bar-track"><div class="stat-bar-fill" style="width:88%;background:#A83220"></div></div>
        <div class="stat-value">88%</div>
      </div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">3.2</span>The Informal Claim</div>
    <p class="body-text">Informal ownership builds up through demonstrated authority — successfully blocking, enabling, or shaping outcomes over time. Each exercise of informal authority makes the next more legitimate. Nobody granted it. The history of exercising it is its own justification. After enough time, questioning it feels like questioning the furniture.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} System Note</div>
      <div class="field-note-text">To find invisible ownership of any decision: find who gets the first phone call when that decision needs to be made. Not the official decision-holder — the person the official decision-holder calls first. That person owns the outcome.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">3.3</span>How Ownership Transfers</div>
    <p class="body-text">Informal ownership transfers differently from formal. Formal transfers happen through appointments and documents. Informal transfers happen through gradual accumulation of demonstrated authority by a successor, and gradual withdrawal of deference to the predecessor. The transition is never announced. It only becomes visible in retrospect, when someone checks who the first phone call goes to now.</p>
  </div>
</div>`},

// PAGE 13 — PART IV CH 1
{id:'p4c1',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part IV · Adaptation Mechanics</div>
    <div class="page-header-right">14</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part IV — Adaptation Mechanics</div>
    <div class="chapter-title">Survival<br>Within Systems</div>
    <div class="chapter-intro">Individuals in high-continuity systems don't learn to be corrupt. They learn to survive. The two overlap more than most people prefer to acknowledge.</div>

    <div class="subchapter-title"><span class="subchapter-num">1.1</span>The Navigation Problem</div>
    <p class="body-text">New people in any institutional environment face a basic navigation problem: what gets rewarded, and what gets punished? The formal answer exists in policy documents. The operative answer exists in watching what actually happens — who gets promoted, who gets frozen out, what gets praised in private vs. in public. That's the real curriculum. Everyone takes it. It's never written down.</p>

          <polygon points="0,-28 58,-44 34,47 -30,46 -60,-42" fill="rgba(168,50,32,.08)" stroke="#A83220" stroke-width="2"/>
          <!-- Axis labels -->
          <text x="0" y="-70" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#6B6760">Competence</text>
          <text x="70" y="-42" font-family="JetBrains Mono" font-size="7" fill="#6B6760">Loyalty</text>
          <text x="44" y="60" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#6B6760">Discretion</text>
          <text x="-44" y="60" text-anchor="end" font-family="JetBrains Mono" font-size="7" fill="#6B6760">Patience</text>
          <text x="-70" y="-42" text-anchor="end" font-family="JetBrains Mono" font-size="7" fill="#6B6760">Compliance</text>
        </g>
        <text x="310" y="148" text-anchor="middle" font-family="JetBrains Mono" font-size="7.5" fill="#A8A49C" letter-spacing="2">traits selected for shift as institution matures</text>
      </svg>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">1.2</span>The Performance of Alignment</div>
    <p class="body-text">In any sufficiently mature system, <em>looking</em> aligned becomes more important than actually being aligned. Performing the right behaviors in the right meetings, in front of the right people, is the survival mechanism. The person who genuinely believes in the mission and acts on it without regard for politics is frequently outpaced by the person who performs belief while navigating effectively. The system selected for the performance. It always does.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 4.1</div>
      <div class="field-note-text">Survival within a system isn't evidence of integrity or competence. It's evidence of successful calibration to the system's actual incentive structure. What survives is what the system selected. To understand what the system values, observe what survives.</div>
    </div>
  </div>
</div>`},

// PAGE 14 — PART IV CH 2
{id:'p4c2',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part IV · Adaptation Mechanics</div>
    <div class="page-header-right">15</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part IV — Adaptation Mechanics</div>
    <div class="chapter-title">Optimization<br>of Behavior</div>
    <div class="chapter-intro">People don't choose corruption. They optimize for their environment, continuously. The environment determines what "optimal" looks like. By the time the result is visible, the process is long invisible.</div>

    <div class="subchapter-title"><span class="subchapter-num">2.1</span>The Gradient Descent of Integrity</div>
    <p class="body-text">Behavioral adjustment in institutions happens in small steps. Nobody wakes up deciding to become the person who covers things up. They make a small accommodation on Monday. By Thursday it's a working method. By next year it's just how things are done. The original values are still technically there — they've just been carefully routed around, one tiny step at a time, each step barely registering.</p>

    <div class="specimen" style="position:relative">
      <div class="specimen-label">Behavioral Shift Log — Observed Sequence</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;line-height:2.2;color:var(--ink-light);padding-top:4px">
        <span style="color:var(--green);font-weight:500">YEAR 1 ·</span> Doesn't flag a process irregularity to avoid a political argument<br>
        <span style="color:var(--green-mid);font-weight:500">YEAR 2 ·</span> Routinely softens written summaries before they go upward<br>
        <span style="color:var(--amber);font-weight:500">YEAR 3 ·</span> Knows which facts to omit from which meetings<br>
        <span style="color:var(--amber);font-weight:500">YEAR 4 ·</span> Has a mental model of "what leadership can handle"<br>
        <span style="color:var(--rust);font-weight:500">YEAR 5 ·</span> Coaches new staff on the same<br>
        <span style="color:var(--rust);font-weight:500">YEAR 6 ·</span> Cannot identify the first moment anything changed
      </div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">2.2</span>Moral Licensing</div>
    <p class="body-text">People who perform visible acts of integrity — calling out a minor issue, flagging an obvious problem — acquire what you could call moral credit. This credit then gets drawn upon to justify subsequent accommodations: having already demonstrated integrity in area A, they become more willing to compromise in area B. The demonstration of integrity doesn't substitute for integrity. It substitutes for the <em>feeling</em> of needing it.</p>

    <div class="danger-note">
      <div class="danger-note-label">${icons.danger} Observer Note</div>
      <div class="danger-note-text">People with strong reputations for integrity aren't less likely to accommodate systemic corruption. They may be more so — their reputation provides cover that less credentialed actors don't have. The field observer weights reputation inversely when assessing likely behavior under institutional pressure.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">2.3</span>The Optimization Horizon</div>
    <p class="body-text">Most behavioral optimization in institutions is short-horizon: what works better today, this week, in this review cycle. The long-term systemic consequences of these micro-decisions aren't visible to the person making them. Each optimization is rational. The aggregate is corrosive. No individual planned it. All of them built it.</p>
  </div>
</div>`},

// PAGE 15 — PART IV CH 3
{id:'p4c3',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part IV · Adaptation Mechanics</div>
    <div class="page-header-right">16</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part IV — Adaptation Mechanics</div>
    <div class="chapter-title">Cost of<br>Resistance</div>
    <div class="chapter-intro">Resisting a system's operative norms isn't free. The costs are real, distributed unevenly, and rarely mentioned in the documentation of why reform failed.</div>

    <div class="subchapter-title"><span class="subchapter-num">3.1</span>What Resistance Costs</div>
    <p class="body-text">Active resistance to institutional norms — flagging what should be flagged, saying what rooms full of people are carefully not saying — produces consistent and predictable responses. Exclusion from informal information loops. Getting dropped from the first-phone-call list. Less informal support for your own initiatives. Being treated as a useful idiot or, worse, a destabilizing one.</p>
    <p class="body-text">These costs aren't imposed by malicious actors. They're the natural regulatory response of a system protecting its equilibrium. The system experiences the resistant person as friction. It reduces friction the way any system does: routing around the problem.</p>

    <div class="diagram-wrap">
      <div class="diagram-label">Fig 4.3 · Resistance Cost vs. Effectiveness Over Time</div>
      <svg viewBox="0 0 600 140" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:600px;display:block">
        <line x1="44" y1="15" x2="44" y2="112" stroke="#E8E0D0" stroke-width="1.5"/>
        <line x1="44" y1="112" x2="572" y2="112" stroke="#E8E0D0" stroke-width="1.5"/>
        <text x="16" y="66" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C" transform="rotate(-90,16,66)">LEVEL</text>
        <text x="308" y="130" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C" letter-spacing="2">DURATION OF RESISTANCE →</text>

        <!-- Cost curve (rises) - red -->
        <path d="M58,104 C115,98 196,84 275,62 C345,44 418,26 560,18"
              stroke="#A83220" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M58,104 C115,98 196,84 275,62 C345,44 418,26 560,18 L560,112 L58,112Z"
              fill="#A83220" opacity=".05"/>

        <!-- Effectiveness curve (falls) - green dashed -->
        <path d="M58,24 C122,28 196,46 268,65 C330,82 382,96 450,107 C495,114 538,115 560,115"
              stroke="#2D6A4F" stroke-width="2.5" fill="none" stroke-dasharray="7,4" stroke-linecap="round"/>
        <path d="M58,24 C122,28 196,46 268,65 C330,82 382,96 450,107 C495,114 538,115 560,115 L560,112 L58,112Z"
              fill="#2D6A4F" opacity=".05"/>

        <!-- Crossover -->
        <circle cx="248" cy="66" r="5" fill="white" stroke="#C67000" stroke-width="2"/>
        <text x="256" y="58" font-family="JetBrains Mono" font-size="7" fill="#C67000">crossover</text>

        <!-- Legend -->
        <line x1="58" y1="132" x2="88" y2="132" stroke="#A83220" stroke-width="2.5"/>
        <text x="92" y="135" font-family="JetBrains Mono" font-size="8" fill="#6B6760">personal cost</text>
        <line x1="244" y1="132" x2="274" y2="132" stroke="#2D6A4F" stroke-width="2.5" stroke-dasharray="7,4"/>
        <text x="278" y="135" font-family="JetBrains Mono" font-size="8" fill="#6B6760">systemic effectiveness</text>
      </svg>
    </div>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 4.3</div>
      <div class="field-note-text">The most effective window for resistance is early — when costs are lower and the individual still has informal currency to spend. Most people deploy resistance after the crossover point, when costs are highest and effectiveness is lowest. The timing is a consistent feature of how systems exhaust resisters before they can produce change.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">3.2</span>The Record</div>
    <p class="body-text">The field observer doesn't advise resistance or accommodation. Both are observable inputs to the system. The record of resistance, in most institutions, is a record of attrition. It's an honest record. The Crocodile keeps it without editorializing.</p>
  </div>
</div>`},

// PAGE 16 — PART V CH 1
{id:'p5c1',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part V · Corruption as Environment</div>
    <div class="page-header-right">17</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part V — Corruption as Environment</div>
    <div class="chapter-title">The Water<br>You're In</div>
    <div class="chapter-intro">Corruption, at sufficient scale and duration, stops being something the institution has. It becomes something the institution is. The water doesn't know it's wet. Neither does the institution.</div>

    <div class="subchapter-title"><span class="subchapter-num">1.1</span>When Corruption Becomes Climate</div>
    <p class="body-text">Environmental corruption isn't experienced as corruption by those inside. It's experienced as <em>conditions</em>. Everyone in a rainy climate knows to carry an umbrella — not because they chose rainy weather, but because they live in it. The corruption is the climate. The behaviors it produces are just practical responses. No individual decision to be corrupt. Just accumulated reasonable responses to an environment that made that easy.</p>

    <div class="subchapter-title"><span class="subchapter-num">1.2</span>Socialization of Norms</div>
    <p class="body-text">New people are socialized to operative norms through watching — what gets rewarded, what gets punished, and what gets zero reaction at all. The process is informal, mostly unconscious, and usually complete within the first year. By the end, the new entrant carries the system's operative norms internally, can apply them without thinking, and may no longer recognize them as having been acquired at all. They just know how things work.</p>

    <div class="pull-quote">
      <div class="pull-quote-text">"Everyone in a rainy climate knows to carry an umbrella. This isn't a moral failing. It's geography."</div>
    </div>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 5.1</div>
      <div class="field-note-text">Bring in an observer with no prior exposure and measure their discomfort at operative behaviors that veteran participants no longer flag. The gap between new-observer response and veteran non-response quantifies the normalization accumulated during the veteran's tenure. This is measurable. It rarely gets measured.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">1.3</span>The Reference Point Problem</div>
    <p class="body-text">Environmental corruption is stable precisely because it removes the reference point from which it could be recognized as corruption. There is no "before" accessible to current participants. The most deviated behaviors have the longest histories. The longest histories produce the deepest assumption of normalcy. By the time anyone thinks to ask "is this okay?" — the answer is buried under years of precedent, none of which anyone chose, all of which everyone inherited.</p>
  </div>
</div>`},

// PAGE 17 — PART V CH 2
{id:'p5c2',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part V · Corruption as Environment</div>
    <div class="page-header-right">18</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part V — Corruption as Environment</div>
    <div class="chapter-title">The Ratchet<br>of Normal</div>
    <div class="chapter-intro">Each increment of deviation, once accepted, becomes the new baseline. Nobody compares against the original. They only compare against last time. This is how things get very far from where they started without anyone making a large decision.</div>

    <div class="diagram-wrap">
      <div class="diagram-label">Fig 5.2 · Normalization Ratchet — Tolerance vs. Original Threshold</div>
      <svg viewBox="0 0 620 175" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:620px;display:block">
        <!-- Axes -->

        <line x1="40" y1="140" x2="600" y2="140" stroke="#E8E0D0" stroke-width="1.5"/>
        <text x="16" y="80" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C" transform="rotate(-90,16,80)">TOLERANCE LEVEL</text>
        <text x="320" y="158" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C" letter-spacing="2">TIME →</text>

        <!-- Original threshold - dashed green -->

        <text x="598" y="115" font-family="JetBrains Mono" font-size="7" fill="#2D6A4F" text-anchor="end">original</text>

        <!-- Ratchet staircase (rising = worse) with fill -->
        <path d="M52,118 L108,118 L108,100 L200,100 L200,80 L292,80 L292,60 L385,60 L385,40 L480,40 L480,24 L598,24"
              stroke="#A83220" stroke-width="2.5" fill="none" stroke-linecap="square"/>

              fill="#A83220" opacity=".05"/>

        <!-- Step labels -->
        <text x="80" y="135" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#6B6760">start</text>
        <text x="154" y="115" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C">+1</text>
        <text x="246" y="95" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C">+2</text>
        <text x="338" y="75" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A8A49C">+3</text>
        <text x="432" y="55" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A83220">+4</text>
        <text x="540" y="38" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#A83220">+5</text>

        <!-- Legend -->
        <path d="M52,168 L88,168" stroke="#A83220" stroke-width="2.5"/>
        <text x="92" y="171" font-family="JetBrains Mono" font-size="7.5" fill="#6B6760">operative tolerance (each step = new normal)</text>
        <line x1="354" y1="168" x2="390" y2="168" stroke="#2D6A4F" stroke-width="1.5" stroke-dasharray="8,5"/>
        <text x="394" y="171" font-family="JetBrains Mono" font-size="7.5" fill="#6B6760">original threshold</text>
      </svg>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">2.1</span>The Ratchet Mechanism</div>
    <p class="body-text">The ratchet works because comparison is always local. Nobody compares current behavior against ten years ago. They compare against last quarter. Each "last quarter" is itself already adapted. The institution has no mechanism for looking all the way back. The ratchet has no reverse.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 5.2</div>
      <div class="field-note-text">Normalization velocity — the rate at which new deviations become unremarkable — tends to increase over time without intervention. High-velocity environments normalize faster, which produces pressure that accelerates further normalization. The mechanism runs itself.</div>
    </div>
  </div>
</div>`},

// PAGE 18 — PART V CH 3
{id:'p5c3',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part V · Corruption as Environment</div>
    <div class="page-header-right">19</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part V — Corruption as Environment</div>
    <div class="chapter-title">Adaptive<br>Decay</div>
    <div class="chapter-intro">The final stage of normalization: the system has adapted so thoroughly to its deviated state that it experiences structural integrity as a foreign condition. Correction doesn't feel like help. It feels like an attack.</div>

    <div class="subchapter-title"><span class="subchapter-num">3.1</span>The Inverted Immune Response</div>
    <p class="body-text">In a system with adaptive decay, detecting corrective effort triggers defensive responses — because the behaviors being corrected are, from the system's internal perspective, normal functions. The correction appears as the dysfunction. The institution mounts an immune response against its own treatment. The reformer is the foreign body. Antibodies mobilize accordingly.</p>
    <p class="body-text">This inversion isn't strategic. It's structural. The system has no internal reference point from which the deviated state looks deviated. It's just the way things are. The people defending it aren't lying. They genuinely cannot see it.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 5.3</div>
      <div class="field-note-text">Observe the institutional response to external audit or new leadership appointed specifically to produce change. If the primary organizational energy goes toward demonstrating that current practices are consistent with the new mandate — rather than actually adapting to it — the institution is exhibiting inverted immune response. Note: this is often accompanied by enthusiastic verbal endorsement of the reform and simultaneous behavioral continuity.</div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">3.2</span>The Archaeology of Function</div>
    <p class="body-text">In advanced adaptive decay, original functions don't disappear — they get buried. The mandate the institution was built around is still technically there, somewhere at the bottom. Potentially recoverable. But getting to it would require suspending the operative behaviors that currently keep everything running. You can't excavate the foundation while people are living in the building.</p>

    <div class="subchapter-title"><span class="subchapter-num">3.3</span>Terminal Equilibrium</div>
    <p class="body-text">Adaptive decay reaches equilibrium not when the system collapses — but when it achieves a stable, self-referential configuration. The system's purpose is its own continuation. Its outputs are its inputs. The constituency it nominally serves has stopped being an operative variable in its calculations. This state can persist indefinitely. Many such states have persisted for decades. Some for generations. The Crocodile has seen several.</p>
  </div>
</div>`},

// PAGE 19 — PART VI CH 1
{id:'p6c1',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part VI · Myth of Control</div>
    <div class="page-header-right">20</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part VI — Myth of Control</div>
    <div class="chapter-title">Illusion of<br>Clean Systems</div>
    <div class="chapter-intro">The belief that a system is clean isn't naive. It's functional — it keeps people inside. And it isn't self-generated. It's carefully produced by the system itself, for exactly that purpose.</div>

    <div class="subchapter-title"><span class="subchapter-num">1.1</span>The Presentation Layer</div>
    <p class="body-text">Every institution past Stage I maintains a presentation layer — the set of behaviors, documents, and interactions specifically staged for external observation. The presentation layer isn't false. It contains accurate elements. It is <em>curated</em>. Which accurate elements get shown, in what order, produces an institutional portrait that may share only structural resemblance to operative reality. The institution isn't lying. It is editing.</p>
    <p class="body-text">Quality of the presentation layer isn't a measure of institutional integrity. It's a measure of institutional experience. The most practiced institutions produce the most convincing self-portraits.</p>

    <div class="specimen" style="position:relative">
      <div class="specimen-label">What the Presentation Layer Shows vs. Doesn't</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-top:4px">
        <div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--green);letter-spacing:2px;margin-bottom:8px">✓ SHOWS</div>
          <div style="font-family:'Lora',serif;font-size:13px;color:var(--ink-light);line-height:2">Completed audits<br>Policy adherence<br>Milestone reports<br>Clear org structure<br>Reform commitments</div>
        </div>
        <div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--rust);letter-spacing:2px;margin-bottom:8px">✗ DOESN'T SHOW</div>
          <div style="font-family:'Lora',serif;font-size:13px;color:var(--ink-light);line-height:2">Who was consulted first<br>What wasn't filed<br>How the audit period was chosen<br>What "completed" means now<br>
          <span style="font-family:'Caveat',cursive;font-size:14px;color:var(--amber)">...and so on</span></div>
        </div>
      </div>
    </div>

    <div class="subchapter-title"><span class="subchapter-num">1.2</span>The Clean System Hypothesis</div>
    <p class="body-text">The assumption that clean systems are the norm — and corruption the exception requiring special explanation — is a category error. Clean systems are brief. They occupy the early phase of any institution's lifecycle, before the natural forces of adaptation, self-preservation, and informal accumulation have had time to do their work. Most institutions are well past that phase before anyone starts looking for it.</p>

    <div class="field-note">
      <div class="field-note-label">${icons.observe} Field Observation 6.1</div>
      <div class="field-note-text">Compare communications produced for external presentation against those produced for internal operative function. The former are polished, measured, attributable. The latter are informal, rapid, and designed not to leave a trace. The content gap between them is the gap between what the institution says it is and what it actually does.</div>
    </div>
  </div>
</div>`},

// PAGE 20 — PART VI CH 2
{id:'p6c2',html:`
<div class="book-page">
  <div class="page-header">
    <div class="page-header-left">Part VI · Myth of Control</div>
    <div class="page-header-right">21</div>
  </div>
  <div class="page-content">
    <div class="part-label">Part VI — Myth of Control</div>
    <div class="chapter-title">Correction<br>as Expansion</div>
    <div class="chapter-intro">Every correction mechanism introduced into a high-continuity institution eventually becomes part of the institution. And then it needs its own correction mechanism. This isn't irony. It's ecology.</div>
